<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Diet Tomorrow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="logo">Diet Tomorrow<span>.</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="login.html" class="active">Login / Sign Up</a>
    </div>
  </nav>

  <main class="container">
    <div class="modal-wrapper">
      <div class="glass-panel modal-card">
        <h2>Welcome Back</h2>

        <!-- ✅ LOGIN FORM -->
        <form id="loginForm">
          
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
          </div>

          <button type="submit" class="btn">Sign In</button>
        </form>

        <p style="margin-top: 20px;">
          Don't have an account? 
          <a href="#">Sign up here</a>
        </p>

      </div>
    </div>
  </main>

  <!-- ✅ LOGIN SCRIPT -->
  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("https://food-order-system-ddgp.onrender.com/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          alert("✅ Login successful");

          // Save user (optional)
          localStorage.setItem("user", JSON.stringify(data.user));

          // Redirect
          window.location.href = "index.html";

        } else {
          alert("❌ " + data.error);
        }

      } catch (error) {
        console.error(error);
        alert("Server error");
      }
    });
  </script>

</body>
</html>
