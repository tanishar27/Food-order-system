<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Diet Tomorrow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loader">
    <div class="spinner"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">Diet Tomorrow<span>.</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="login.html" class="active">Login / Sign Up</a>
    </div>
    <div class="nav-icons">
      <a href="cart.html" class="nav-icon" aria-label="Cart">
        🛒<span class="cart-badge">0</span>
      </a>
    </div>
  </nav>

  <main class="container">
    <div class="modal-wrapper">
      <div class="glass-panel modal-card" id="auth-card">
        <!-- Login Form -->
        <div id="login-section">
          <h2>Welcome Back</h2>
          <p>Ready to satisfy your cravings?</p>

          <form autocomplete="off" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" class="input-glass" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" class="input-glass" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn">Sign In</button>
          </form>

          <p style="margin-top: 25px; font-size: 14px; color: var(--text-muted);">
            Don't have an account? <a href="#" onclick="toggleAuth('signup')" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign up here</a>
          </p>
        </div>

        <!-- Registration Form (Hidden by default) -->
        <div id="signup-section" style="display: none;">
          <h2>Create Account</h2>
          <p>Join the Diet Tomorrow family</p>

          <form autocomplete="off" onsubmit="handleRegister(event)">
            <div class="form-group">
              <label for="reg-name">Full Name</label>
              <input type="text" id="reg-name" class="input-glass" placeholder="John Doe" required>
            </div>
            <div class="form-group">
              <label for="reg-email">Email Address</label>
              <input type="email" id="reg-email" class="input-glass" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
              <label for="reg-password">Password</label>
              <input type="password" id="reg-password" class="input-glass" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn">Create Account</button>
          </form>

          <p style="margin-top: 25px; font-size: 14px; color: var(--text-muted);">
            Already have an account? <a href="#" onclick="toggleAuth('login')" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
