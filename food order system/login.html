<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Diet Tomorrow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loader">
    <div class="spinner"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">Diet Tomorrow<span>.</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="login.html" class="active">Login / Sign Up</a>
    </div>
    <div class="nav-icons">
      <a href="cart.html" class="nav-icon" aria-label="Cart">
        🛒<span class="cart-badge">0</span>
      </a>
    </div>
  </nav>

  <main class="container">
    <div class="modal-wrapper">
      <div class="glass-panel modal-card">
        <h2>Welcome Back</h2>

        <form autocomplete="off" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="input-glass"  required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="input-glass" placeholder="••••••••" required>
          </div>
          
          <button type="submit" class="btn">Sign In</button>
        </form>

        <p style="margin-top: 20px; font-size: 14px;">
          Don't have an account? <a href="#" style="color: var(--primary); text-decoration: none;">Sign up here</a>
        </p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
