<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu | Diet Tomorrow</title>
  <meta name="description" content="Explore our wide menu of delicious hot foods.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Loading Overlay -->
  <div id="loader">
    <div class="spinner"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">Diet Tomorrow<span>.</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="menu.html" class="active">Menu</a>
      <a href="#" onclick="handleLogout(event)">Logout</a>
    </div>
    <div class="nav-icons">
      <a href="cart.html" class="nav-icon" aria-label="Cart">
        🛒<span class="cart-badge">0</span>
      </a>
    </div>
  </nav>

  <main class="container">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h1 style="font-size: 38px;">Our <span style="color: var(--primary);">Menu</span></h1>
      <div style="width: 250px;">
        <input type="text" id="searchInput" class="input-glass" placeholder="Search food..." aria-label="Search food">
      </div>
    </div>

    <!-- Filter Chips -->
    <div class="filters">
      <div class="filter-chip active" data-filter="All">All</div>
      <div class="filter-chip" data-filter="Pizza">Pizza 🍕</div>
      <div class="filter-chip" data-filter="Burgers">Burgers 🍔</div>
      <div class="filter-chip" data-filter="Desserts">Desserts 🍰</div>
      <div class="filter-chip" data-filter="Drinks">Drinks 🥤</div>
      <div class="filter-chip" data-filter="Indian">Indian 🍛</div>
    </div>

    <div class="food-grid" id="food-grid">
      <!-- Food cards will be dynamically loaded here by script.js -->
    </div>


      <script src="script.js"></script>
</body>

</html>
