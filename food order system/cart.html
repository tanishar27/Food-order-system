<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Diet Tomorrow</title>
  <style>
    
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">Diet Tomorrow<span>.</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="#" onclick="handleLogout(event)">Logout</a>
    </div>
    <div class="nav-icons">
      <a href="cart.html" class="nav-icon" aria-label="Cart">
        🛒<span class="cart-badge">0</span>
      </a>
    </div>
  </nav>

  <main class="container">
    <h1 style="font-size: 38px; margin-bottom: 30px;">Your Cart</h1>
    
    <div class="cart-layout">
      <!-- Left: Cart Items -->
      <div class="cart-items" id="cart-items-container">
        <!-- Rendered by JS -->
      </div>
      
      <!-- Right: Summary (Model-like simple card structure) -->
      <div>
        <div class="glass-panel cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="cart-subtotal">₹0</span>
          </div>
          <div class="summary-row">
            <span>GST (5%)</span>
            <span id="cart-tax">₹0</span>
          </div>
          <div class="summary-row">
            <span>Delivery Fee</span>
            <span>₹40</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="cart-total">₹0</span>
          </div>
          <button onclick="placeOrder(event)" class="btn" style="width: 100%; margin-top: 20px; border: none;">Place Order</button>
        </div>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
