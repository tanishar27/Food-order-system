<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed | Diet Tomorrow</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Confirmation Page Extras ── */
    .confirm-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 85vh;
    }

    .confirm-card {
      width: 100%;
      max-width: 540px;
      text-align: center;
      padding: 56px 44px;
      position: relative;
      overflow: hidden;
    }
    .confirm-card::before {
      content: '';
      position: absolute;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(39,174,96,0.08), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Big animated tick */
    .tick-ring {
      width: 110px; height: 110px;
      margin: 0 auto 32px;
      position: relative;
    }
    .tick-ring svg {
      width: 110px; height: 110px;
      transform: rotate(-90deg);
    }
    .tick-ring circle.bg {
      fill: none;
      stroke: rgba(39,174,96,0.1);
      stroke-width: 4;
    }
    .tick-ring circle.prog {
      fill: none;
      stroke: #27ae60;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 314;
      stroke-dashoffset: 314;
      animation: drawCircle 1s ease-out 0.3s forwards;
      filter: drop-shadow(0 0 8px rgba(39,174,96,0.7));
    }
    @keyframes drawCircle {
      to { stroke-dashoffset: 0; }
    }
    .tick-emoji {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 44px;
      animation: popTick 0.5s cubic-bezier(0.16,1,0.3,1) 1.1s forwards;
    }
    @keyframes popTick {
      0%  { transform: translate(-50%,-50%) scale(0) rotate(-20deg); opacity: 0; }
      60% { transform: translate(-50%,-50%) scale(1.15) rotate(5deg); opacity: 1; }
      100%{ transform: translate(-50%,-50%) scale(1) rotate(0deg);   opacity: 1; }
    }

    .confirm-title {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 1.4s forwards;
    }
    .confirm-subtitle {
      color: var(--text-muted);
      font-size: 16px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 1.6s forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Order ID chip */
    .order-id-chip {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 14px 20px;
      margin-bottom: 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 1.8s forwards;
    }
    .order-id-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .order-id-val {
      font-weight: 700;
      font-size: 16px;
      background: var(--gradient-main);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.04em;
    }

    /* ── Countdown Section ── */
    .countdown-wrap {
      background: linear-gradient(135deg, rgba(255,0,79,0.08), rgba(255,106,0,0.08));
      border: 1px solid rgba(255,0,79,0.2);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 2s forwards;
      position: relative;
      overflow: hidden;
    }
    .countdown-wrap::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,0,79,0.03), transparent);
      animation: shimmer 2.5s linear infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .countdown-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .countdown-label::before,
    .countdown-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }

    .countdown-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
    }
    .cd-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .cd-num {
      font-size: 58px;
      font-weight: 900;
      letter-spacing: -0.04em;
      background: var(--gradient-main);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      min-width: 80px;
      text-align: center;
    }
    .cd-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }
    .cd-colon {
      font-size: 48px;
      font-weight: 900;
      color: rgba(255,0,79,0.5);
      margin-bottom: 18px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .countdown-progress {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
    }
    .countdown-bar {
      height: 100%;
      background: var(--gradient-main);
      border-radius: 100px;
      width: 100%;
      transition: width 1s linear;
      box-shadow: 0 0 12px rgba(255,0,79,0.5);
    }
    .countdown-msg {
      margin-top: 12px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .countdown-msg span {
      color: white;
      font-weight: 600;
    }

    /* Driver animation strip */
    .delivery-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      position: relative;
    }
    .delivery-line {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      position: relative;
      overflow: hidden;
    }
    .delivery-line::after {
      content: '';
      position: absolute;
      top: 0; left: -40%;
      width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,0,79,0.8), transparent);
      animation: deliveryMove 2s linear infinite;
    }
    @keyframes deliveryMove {
      to { left: 140%; }
    }
    .delivery-icon { font-size: 22px; }

    /* Buttons */
    .confirm-actions {
      display: flex;
      gap: 14px;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 2.2s forwards;
    }
    .confirm-actions .btn {
      flex: 1;
      text-decoration: none;
      text-align: center;
    }

    .ready-badge {
      display: none;
      background: rgba(39,174,96,0.15);
      border: 1px solid rgba(39,174,96,0.4);
      color: #27ae60;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 20px;
      border-radius: var(--radius-md);
      margin-bottom: 14px;
      animation: popIn 0.6s cubic-bezier(0.16,1,0.3,1);
      text-align: center;
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">Diet Tomorrow<span>.</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="#" onclick="handleLogout(event)">Logout</a>
    </div>
    <div class="nav-icons">
      <a href="cart.html" class="nav-icon" aria-label="Cart">
        🛒<span class="cart-badge" style="display:none;">0</span>
      </a>
    </div>
  </nav>

  <main class="container">
    <div class="confirm-wrapper">
      <div class="glass-panel confirm-card">

        <!-- Animated Tick -->
        <div class="tick-ring">
          <svg viewBox="0 0 110 110">
            <circle class="bg"   cx="55" cy="55" r="50"/>
            <circle class="prog" cx="55" cy="55" r="50"/>
          </svg>
          <div class="tick-emoji">✅</div>
        </div>

        <div class="confirm-title">Order Confirmed!</div>
        <div class="confirm-subtitle">
          Payment successful. Your food is being prepared with love 🍳
        </div>

        <!-- Order ID -->
        <div class="order-id-chip">
          <div>
            <div class="order-id-label">Order ID</div>
            <div class="order-id-val" id="order-id-display">#DT-0000</div>
          </div>
          <div style="font-size:22px;">🧾</div>
        </div>

        <!-- ── Countdown ── -->
        <div class="countdown-wrap">
          <div class="countdown-label">🔥 &nbsp;Your order will be ready in</div>

          <div class="countdown-display">
            <div class="cd-unit">
              <div class="cd-num" id="cd-mins">25</div>
              <div class="cd-label">mins</div>
            </div>
            <div class="cd-colon">:</div>
            <div class="cd-unit">
              <div class="cd-num" id="cd-secs">00</div>
              <div class="cd-label">secs</div>
            </div>
          </div>

          <div class="countdown-progress">
            <div class="countdown-bar" id="cd-bar"></div>
          </div>

          <div class="countdown-msg">
            Estimated delivery: <span id="delivery-time-label">--</span>
          </div>

          <div class="delivery-strip" style="margin-top:16px;">
            <div class="delivery-icon">🏪</div>
            <div class="delivery-line"></div>
            <div class="delivery-icon">🛵</div>
            <div class="delivery-line"></div>
            <div class="delivery-icon">🏠</div>
          </div>
        </div>

        <!-- Ready badge (shown when timer ends) -->
        <div class="ready-badge" id="ready-badge">
          🎉 Your order is ready for pickup / on its way!
        </div>

        <!-- CTA Buttons -->
        <div class="confirm-actions">
          <a href="index.html" class="btn btn-outline">🏠 Home</a>
          <a href="menu.html" class="btn">🍔 Order More</a>
        </div>

      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    // ── On load ──
    window.addEventListener('load', () => {
      // Clear cart
      if (typeof clearCart === 'function') clearCart();

      // Generate order ID
      const id = 'DT-' + Math.random().toString(36).substring(2, 8).toUpperCase();
      document.getElementById('order-id-display').textContent = '#' + id;

      // Get prep time from localStorage (set by payment.html)
      let totalMins = parseInt(localStorage.getItem('prepMins')) || 25;
      let totalSecs = parseInt(localStorage.getItem('prepSecs')) || 0;
      localStorage.removeItem('prepMins');
      localStorage.removeItem('prepSecs');

      // Delivery time label
      const now = new Date();
      now.setMinutes(now.getMinutes() + totalMins + Math.ceil(totalSecs / 60) + 5);
      const hh = now.getHours().toString().padStart(2, '0');
      const mm = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('delivery-time-label').textContent =
        `approx. ${hh}:${mm} (${totalMins}–${totalMins + 5} min)`;

      // Total seconds for progress bar
      const totalSeconds = totalMins * 60 + totalSecs;
      let remaining = totalSeconds;

      function tick() {
        if (remaining <= 0) {
          // Timer done
          document.getElementById('cd-mins').textContent = '00';
          document.getElementById('cd-secs').textContent = '00';
          document.getElementById('cd-bar').style.width = '0%';
          document.getElementById('ready-badge').style.display = 'block';
          return;
        }

        remaining--;
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        document.getElementById('cd-mins').textContent = String(m).padStart(2, '0');
        document.getElementById('cd-secs').textContent = String(s).padStart(2, '0');

        const pct = (remaining / totalSeconds) * 100;
        document.getElementById('cd-bar').style.width = pct + '%';

        setTimeout(tick, 1000);
      }

      // Start countdown after a short animation delay
      setTimeout(tick, 2400);
    });
  </script>
</body>
</html>
